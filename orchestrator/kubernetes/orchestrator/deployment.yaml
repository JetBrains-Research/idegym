apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/component: controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: orchestrator
      imagePullSecrets:
        - name: regcred
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: orchestrator
          image: ghcr.io/jetbrains-research/idegym/orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: __POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: __POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: __NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: __NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: IDEGYM_ASYNCIO_DEBUG
              value: "True"
            - name: IDEGYM_ASYNCIO_DUMP_INTERVAL
              value: "60"
            - name: IDEGYM_LOG_LEVEL
              value: "DEBUG"
            - name: IDEGYM_OTEL_ATTRIBUTES
              value: |-
                { k8s.pod.uid: "$(__POD_UID)", k8s.pod.name: "$(__POD_NAME)", k8s.namespace.name: "$(__NAMESPACE)", k8s.node.name: "$(__NODE_NAME)" }
            - name: IDEGYM_OTEL_SERVICE_NAME
              value: orchestrator
            - name: IDEGYM_OTEL_TRACING_ENDPOINT
              value: "http://tempo:4318/v1/traces"
            - name: IDEGYM_OTEL_TRACING_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tracing
                  key: username
                  optional: true
            - name: IDEGYM_OTEL_TRACING_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tracing
                  key: password
                  optional: true
            - name: POSTGRES_HOST
              value: postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: idegym
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 60
            timeoutSeconds: 60
