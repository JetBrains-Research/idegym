[alembic]
# path to migration scripts
script_location = orchestrator/migrations

file_template = %%(rev)s_%%(slug)s

prepend_sys_path = .

version_path_separator = os

# UNUSED, WORKS AS A STUB TO AUTOGENERATE {rev}_{slug}.py FILES
# IN ORCHESTRATOR WILL BE OVERRIDDEN INTERNALLY TO ACTUAL URL
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration (fallback). Alembic env.py will configure logging via orchestrator utils.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[post_write_hooks]
hooks = ruff_check, ruff_format

ruff_check.type = exec
ruff_check.executable = ruff
ruff_check.options = check --fix REVISION_SCRIPT_FILENAME

ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
