images:
  - base: registry.kube-system.svc.cluster.local/server-debian-bookworm-20250520-slim:latest
    plugins:
      - type: base-system
        minimal: true
    commands:
      - echo "minimal-test" > /tmp/minimal-test.txt
    runtime_class_name: gvisor
    resources:
      requests:
        cpu: "500m"
        memory: "500Mi"
        ephemeral-storage: "1Gi"
      limits:
        cpu: "500m"
        memory: "500Mi"
        ephemeral-storage: "1Gi"
