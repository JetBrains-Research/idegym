version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 7
    target-branch: main
    groups:
      astral:
        patterns:
          - "astral-sh/*"
      core:
        patterns:
          - "actions/*"
      docker:
        patterns:
          - "docker/*"
    commit-message:
      prefix: "[ci] "
    labels:
      - dependencies
  - package-ecosystem: docker
    directory: /orchestrator
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 7
    target-branch: main
    groups:
      python:
        patterns:
          - "python"
    commit-message:
      prefix: "[orchestrator] "
    labels:
      - dependencies
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    cooldown:
      default-days: 7
    target-branch: main
    groups:
      opentelemetry:
        patterns:
          - "opentelemetry-*"
      testing:
        patterns:
          - "pytest*"
          - "testcontainers"
    commit-message:
      prefix: "[dependencies] "
    labels:
      - dependencies
