name: "Prepare Docker Build"
description: "Set up environment for Docker image building with common preparation steps"
inputs:
  github_token:
    description: "GitHub token for GHCR authentication"
    required: true
runs:
  using: "composite"
  steps:
    - name: Prepare Repository
      uses: ./.github/actions/prepare-repository

    - name: Remove Unwanted Software
      uses: ./.github/actions/remove-unwanted-software

    - name: Install Docker
      uses: docker/setup-docker-action@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Install Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: github-actions[bot]
        password: ${{ inputs.github_token }}
