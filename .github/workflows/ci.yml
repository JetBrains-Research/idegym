name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --all-packages --all-extras --all-groups
      - name: Check code style
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.8"
          args: "check --output-format github"

  test:
    name: Run ${{ matrix.suite }} tests
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - suite: unit
            runner: ubuntu-latest
          - suite: integration
            runner: ubuntu-latest
            registry: "localhost:5000"
          - suite: e2e
            runner: ubuntu-latest-8-cores-x64
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout latest
        uses: actions/checkout@v6
      - name: Install Docker
        if: matrix.suite != 'e2e'
        uses: docker/setup-docker-action@v5
      - name: Install Docker Buildx
        if: matrix.suite != 'e2e'
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
      - name: Start minikube
        if: matrix.suite == 'e2e'
        uses: medyagh/setup-minikube@v0.0.21
        with:
          addons: gvisor,ingress
          container-runtime: containerd
          kubernetes-version: v1.35.0
          start-args: --docker-opt containerd=/var/run/containerd/containerd.sock
      - name: Configure hosts and wait for ingress controller to be ready
        if: matrix.suite == 'e2e'
        run: |
          echo "127.0.0.1 idegym-local.test" | sudo tee -a /etc/hosts
          kubectl wait pod \
                  --namespace=ingress-nginx \
                  --for=condition=ready \
                  --selector=app.kubernetes.io/component=controller \
                  --timeout=120s
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install
      - name: Login to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: github-actions[bot]
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build server image
        if: matrix.suite == 'integration'
        run: scripts/build_server_images.py --skip-base ubuntu
      - name: Install dependencies
        run: uv sync --all-packages --all-extras --all-groups
      - name: Run ${{ matrix.suite }} tests
        run: |
          if [ "${{ matrix.suite }}" = "e2e" ]; then
            sudo -E kubectl port-forward -n ingress-nginx svc/ingress-nginx-controller 80:80 > /dev/null 2>&1 &
            sleep 5
          fi
          uv run pytest -m "${{ matrix.suite }}" -vv
        env:
          IDEGYM_TEST_REGISTRY: ${{ matrix.registry || '' }}
