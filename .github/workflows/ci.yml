name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --all-packages --all-extras --all-groups
      - name: Check code style
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.4"
          args: "check --output-format github"

  test:
    name: Run ${{ matrix.suite }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration]
    env:
      IDEGYM_TEST_REGISTRY: "localhost:5000"
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout latest
        uses: actions/checkout@v6
      - name: Remove Unwanted Software
        uses: ./.github/actions/remove-unwanted-software
      - name: Install Docker
        uses: docker/setup-docker-action@v5
      - name: Install Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install
      - name: Login to Docker registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build server image
        if: matrix.suite == 'integration'
        run: scripts/build_server_images.py --skip-base ubuntu
      - name: Install dependencies
        run: uv sync --all-packages --all-extras --all-groups
      - name: Run ${{ matrix.suite }} tests
        run: uv run pytest -vv -m "${{ matrix.suite }}"
