apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "idegym.fullname" . }}
  labels:
    {{- include "idegym.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "idegym.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "idegym.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
